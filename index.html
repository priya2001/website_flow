<!DOCTYPE html>
<html>
<head>
  <title>Workflow Diagram</title>
  <style>
    body {
      margin: 0;
      overflow: auto;
      background: #111;
      font-family: Arial, sans-serif;
    }
    .container {
      width: 100%;
      min-height: 100vh;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    img {
      display: block;
      max-width: 100%;
      height: auto;
      width: auto;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="flow.png" alt="Workflow Diagram">
  </div>
</body>
</html>
